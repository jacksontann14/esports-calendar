# ============================================================
# Calendar configuration
# ============================================================
# Each block below produces ONE .ics file at its own stable URL.
# Add a new block to create a new subscribable calendar.
# Edit an existing block to change its filters — the same URL will
# start serving updated results on the next scheduled run.
#
# Available keys (all optional except name/output/game):
#   name                 - label shown in build logs, not the calendar itself
#   output               - path to write the .ics file, must be under docs/
#   game                 - "lol" or "valorant"
#   regions              - string or list of strings (league/region filter)
#   team                 - string, only matches involving this team
#   days_ahead           - int, only matches in the next N days
#   states               - string or list, e.g. "unstarted"
#   exclude_tbd          - true/false, drop undetermined bracket slots
#   cal_name             - name shown in calendar apps (e.g. "Subscribed" list)
#   description          - subtext shown on the calendar's card on the webpage
#                          (defaults to "N matches" if omitted)
#   color                - card accent color on the webpage, e.g. "cyan",
#                          "violet", "amber" (defaults to cyan for lol,
#                          violet for valorant — see DEFAULT_COLORS in
#                          generate.py)
#   text_header          - prefix shown on every event, e.g. "T1 Game Day"
#   include_league_tag   - true/false, include "[GAME][LEAGUE]" in the title
#   add_reminder_minutes - int, popup reminder N minutes before match start
#
# Note: the "league" tag shown on each webpage card (e.g. "LCK", "MSI") is
# NOT set here — it's auto-derived by generate.py from the actual matches
# fetched, so it always reflects real data rather than what you typed.
# ============================================================

- name: "Internationals"
  output: "docs/internationals.ics"
  game: "lol"
  regions: ["First Stand", "MSI", "Worlds", "Worlds Qualifying Series", "Esports World Cup"]
  exclude_tbd: true
  cal_name: "Internationals Schedule"
  description: "Upcoming international matches"
  states: ["inProgress", "unstarted"]
  include_league_tag: true
  add_reminder_minutes: 30

- name: "BLG Matches"
  output: "docs/blg_lpl.ics"
  game: "lol"
  team: "BILIBILI GAMING"
  days_ahead: 30
  cal_name: "LPL - BLG Games"
  description: "LPL matches involving BLG"
  states: ["inProgress", "unstarted"]
  include_league_tag: true
  add_reminder_minutes: 30

- name: "PRX Games"
  output: "docs/prx_vct.ics"
  game: "valorant"
  regions: ["ewc_val", "vct_pacific", "masters", "champions"]
  team: "Paper Rex"
  cal_name: "PRX Games"
  description: "VCT Matches involving PRX"
  states: ["inProgress", "unstarted"]
  text_header: "PRX Game Day"
  include_league_tag: true
  add_reminder_minutes: 30