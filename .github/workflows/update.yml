name: Update calendars

on:
  schedule:
    - cron: "0 0 * * *"     # once a day at midnight UTC — adjust as you like
  workflow_dispatch: {}      # lets you trigger a run manually from the Actions tab
  push:
    branches: [main]         # rebuild immediately when you edit calendars.yaml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests icalendar pyyaml

      - name: Generate calendars
        run: python generate.py
        env:
          VALORANT_API_KEY: ${{ secrets.VALORANT_API_KEY }}
          LOL_API_KEY: ${{ secrets.LOL_API_KEY }}

      - name: Commit and push updated .ics files
        run: |
          git config user.name "calendar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/*.ics
          git diff --quiet --cached || git commit -m "Update calendars [automated]"
          git push
